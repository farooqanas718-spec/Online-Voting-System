<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Password - Admin</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/enhancements.css">
</head>
<body>
<nav class="navbar">
  <div class="container">
    <div class="navbar-content">
      <a href="/admin/dashboard" class="navbar-brand">🗳️ VoteSecure Admin</a>
      <ul class="navbar-nav">
        <li><a href="/admin/dashboard">← Dashboard</a></li>
        <li><a href="/logout" class="btn btn-sm btn-outline">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4">{{FLASH_MESSAGE}}</div>
<main>
<div class="container py-6">
  <div class="card-glass p-8" style="max-width:600px;margin:0 auto;">
    <h1 class="h2 mb-2">Change Password</h1>
    <p class="text-gray mb-6">Admin: <strong>{{USER_NAME}}</strong></p>
    <form method="POST" action="/admin/change-password">
      <div class="form-group">
        <label for="current_password" class="form-label">Current Password</label>
        <input type="password" id="current_password" name="current_password" class="form-control" required>
      </div>
      <div class="form-group">
        <label for="new_password" class="form-label">New Password</label>
        <input type="password" id="new_password" name="new_password" class="form-control"
            placeholder="Minimum 8 characters" required minlength="8" oninput="checkStrength(this.value)">
        <div class="progress mt-2" style="height:8px;">
          <div id="strength-bar" class="progress-bar" style="width:0%;transition:width 0.3s,background 0.3s;"></div>
        </div>
        <span id="strength-label" class="form-text"></span>
      </div>
      <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-primary btn-lg">🔒 Change Password</button>
        <a href="/admin/dashboard" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
</main>
<footer class="footer">
  <div class="container"><p>&copy; 2026 Online Voting System | Developed by <strong>Anas Farooq</strong></p></div>
</footer>
<script>
function checkStrength(pw){
  let s=0;
  if(pw.length>=8)s++;if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  const bar=document.getElementById('strength-bar');
  const lbl=document.getElementById('strength-label');
  const cols=['#ef4444','#f59e0b','#eab308','#22c55e'];
  const lbls=['Weak','Fair','Good','Strong'];
  bar.style.width=(s*25)+'%';
  bar.style.background=cols[s-1]||'#ef4444';
  lbl.textContent=s>0?lbls[s-1]:'';
}
document.addEventListener('DOMContentLoaded',function(){
  const alerts=document.querySelectorAll('.alert');
  alerts.forEach(a=>{setTimeout(()=>{a.style.opacity='0';a.style.transition='all 0.3s';setTimeout(()=>a.remove(),300)},5000);});
  document.cookie='flash_msg=;Path=/;Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
  document.cookie='flash_type=;Path=/;Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
});
</script>
</body>
</html>

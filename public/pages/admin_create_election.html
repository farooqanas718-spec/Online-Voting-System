<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Create Election - Admin</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/enhancements.css">
</head>
<body>
<nav class="navbar">
  <div class="container">
    <div class="navbar-content">
      <a href="/admin/dashboard" class="navbar-brand">🗳️ VoteSecure Admin</a>
      <ul class="navbar-nav">
        <li><a href="/admin/elections">← Elections</a></li>
        <li><a href="/logout" class="btn btn-sm btn-outline">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4">{{FLASH_MESSAGE}}</div>
<main>
<div class="container py-6">
  <div class="card-glass p-8" style="max-width:900px;margin:0 auto;">
    <h1 class="h2 mb-6">Create New Election</h1>
    <form method="POST" action="/admin/elections/create">
      <div class="form-group">
        <label for="title" class="form-label">Election Title</label>
        <input type="text" id="title" name="title" class="form-control" placeholder="e.g. Student Council Election 2026" required>
      </div>
      <div class="form-group">
        <label for="description" class="form-label">Description</label>
        <textarea id="description" name="description" class="form-control" rows="3" placeholder="Describe this election..."></textarea>
      </div>
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-group">
            <label for="start_date" class="form-label">Start Date &amp; Time</label>
            <input type="datetime-local" id="start_date" name="start_date" class="form-control" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label for="end_date" class="form-label">End Date &amp; Time</label>
            <input type="datetime-local" id="end_date" name="end_date" class="form-control" required>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Select Eligible Voters</label>
        <p class="text-sm text-gray mb-3">Only selected voters will be able to vote and apply as candidates</p>
        <div class="card-glass p-4" style="max-height:400px;overflow-y:auto;">
          <div class="mb-3">
            <button type="button" class="btn btn-sm btn-secondary" onclick="document.querySelectorAll('.voter-checkbox').forEach(c=>c.checked=true)">Select All</button>
            <button type="button" class="btn btn-sm btn-secondary" onclick="document.querySelectorAll('.voter-checkbox').forEach(c=>c.checked=false)">Deselect All</button>
          </div>
          <div class="row g-2">
            {{VOTER_CHECKBOXES}}
          </div>
        </div>
      </div>
      <div class="d-flex gap-3">
        <button type="submit" class="btn btn-primary btn-lg">Create Election</button>
        <a href="/admin/elections" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
</main>
<footer class="footer">
  <div class="container"><p>&copy; 2026 Online Voting System | Developed by <strong>Anas Farooq</strong></p></div>
</footer>
<script>
document.addEventListener('DOMContentLoaded',function(){
  const alerts=document.querySelectorAll('.alert');
  alerts.forEach(a=>{setTimeout(()=>{a.style.opacity='0';a.style.transition='all 0.3s';setTimeout(()=>a.remove(),300)},5000);});
  document.cookie='flash_msg=;Path=/;Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
  document.cookie='flash_type=;Path=/;Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
});
</script>
</body>
</html>

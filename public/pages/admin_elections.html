<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Manage Elections - Admin</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/enhancements.css">
</head>
<body>
<nav class="navbar">
  <div class="container">
    <div class="navbar-content">
      <a href="/admin/dashboard" class="navbar-brand">🗳️ VoteSecure Admin</a>
      <ul class="navbar-nav">
        <li><span style="color:var(--gray-600);"><strong>{{USER_NAME}}</strong></span></li>
        <li><a href="/admin/dashboard">Dashboard</a></li>
        <li><a href="/admin/elections">Elections</a></li>
        <li><a href="/admin/voters">Voters</a></li>
        <li><a href="/logout" class="btn btn-sm btn-outline">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>
<div class="container mt-4">{{FLASH_MESSAGE}}</div>
<main>
<div class="container py-6">
  <div class="d-flex justify-content-between align-items-center mb-6">
    <h1>Manage Elections</h1>
    <a href="/admin/elections/create" class="btn btn-primary">➕ Create New Election</a>
  </div>
  <div class="card-glass p-6">
    {{NO_ELECTIONS_MSG}}
    <div class="table-responsive">
      <table class="table">
        <thead>
          <tr>
            <th>Title</th><th>Status</th><th>Date Range</th><th>Voters</th><th>Candidates</th><th>Votes</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>{{ELECTION_ROWS}}</tbody>
      </table>
    </div>
  </div>
</div>
</main>
<footer class="footer">
  <div class="container"><p>&copy; 2026 Online Voting System | Developed by <strong>Anas Farooq</strong></p></div>
</footer>
<script src="/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded',function(){
  const alerts=document.querySelectorAll('.alert');
  alerts.forEach(a=>{setTimeout(()=>{a.style.opacity='0';a.style.transition='all 0.3s';setTimeout(()=>a.remove(),300)},5000);});
  document.cookie='flash_msg=;Path=/;Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
  document.cookie='flash_type=;Path=/;Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
});
</script>
</body>
</html>

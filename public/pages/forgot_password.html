<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forgot Password - Voting System</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/utilities.css">
<link rel="stylesheet" href="/css/enhancements.css">
<style>
  body { min-height:100vh; display:flex; flex-direction:column; justify-content:center; background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%); }
  .login-card { max-width:460px; margin:0 auto; width:100%; padding:var(--space-6); }
  .brand { text-align:center; margin-bottom:var(--space-8); }
  .brand-icon { font-size:3rem; display:block; margin-bottom:var(--space-2); }
  .brand-title { font-size:var(--text-3xl); font-weight:800; background:var(--gradient-primary); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .brand-sub { color:rgba(255,255,255,0.5); font-size:var(--text-sm); margin-top:var(--space-1); }
  .card-glass { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:var(--radius-2xl); padding:var(--space-8); }
  .card-glass .form-label { color:rgba(255,255,255,0.8); }
  .card-glass h2 { color:#fff; }
  .card-glass p { color:rgba(255,255,255,0.5); }
  .form-control { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.15); color:#fff; }
  .form-control:focus { background:rgba(255,255,255,0.1); border-color:var(--primary-500); color:#fff; }
  .form-control::placeholder { color:rgba(255,255,255,0.3); }
  .info-box { background:rgba(99,102,241,0.15); border:1px solid rgba(99,102,241,0.3); border-radius:var(--radius-lg); padding:var(--space-4); margin-bottom:var(--space-6); color:rgba(255,255,255,0.8); font-size:var(--text-sm); }
</style>
</head>
<body>
<div class="container">
  <div class="login-card py-8">
    <div class="brand">
      <span class="brand-icon">🔑</span>
      <div class="brand-title">VoteSecure</div>
      <div class="brand-sub">Online Voting System</div>
    </div>
    {{FLASH_MESSAGE}}
    <div class="card-glass">
      <h2 class="mb-2">Forgot Password?</h2>
      <p class="mb-6">Enter your CNIC and registered email address to submit a reset request.</p>
      <div class="info-box">
        📧 Your request will be reviewed by the admin. You will receive your new password via your registered email address.
      </div>
      <form method="POST" action="/forgot-password">
        <div class="form-group">
          <label for="cnic" class="form-label">CNIC Number</label>
          <input type="text" id="cnic" name="cnic" class="form-control"
            placeholder="0000000000000 (13 digits)" required maxlength="15"
            pattern="\d{13}" title="Enter 13 digit CNIC without dashes">
        </div>
        <div class="form-group">
          <label for="email" class="form-label">Registered Email</label>
          <input type="email" id="email" name="email" class="form-control"
            placeholder="your@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary w-full btn-lg mb-4">
          📤 Submit Reset Request
        </button>
        <div class="text-center">
          <a href="/login" style="color:rgba(255,255,255,0.5);font-size:var(--text-sm);">← Back to Login</a>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
document.addEventListener('DOMContentLoaded',function(){
  const alerts=document.querySelectorAll('.alert');
  alerts.forEach(a=>{setTimeout(()=>{a.style.opacity='0';a.style.transition='all 0.3s';setTimeout(()=>a.remove(),300)},7000);});
  document.cookie='flash_msg=;Path=/;Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
  document.cookie='flash_type=;Path=/;Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
  /* Format CNIC input */
  const cnic=document.getElementById('cnic');
  if(cnic){cnic.addEventListener('input',function(){this.value=this.value.replace(/\D/g,'').slice(0,13);});}
});
</script>
</body>
</html>
